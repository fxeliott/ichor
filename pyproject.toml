# ============================================================================
# Ichor — root Python tooling configuration
# Applies to all Python packages in the monorepo (apps/api, apps/claude-runner,
# packages/agents, packages/ml).
# Each package has its own pyproject.toml for dependencies; this root file
# centralizes ruff/mypy/pytest config for consistency.
# ============================================================================

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    ".venv",
    ".venv-tooling",
    "node_modules",
    ".turbo",
    "phase0-artifacts",
    "infra/ansible/roles/*/files",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "S",    # flake8-bandit (security)
    "ASYNC", # flake8-async
    "DTZ",  # flake8-datetimez (no naive datetime)
    "PIE",  # flake8-pie
    "RUF",  # ruff-specific
]
ignore = [
    "E501",   # line-too-long (handled by formatter)
    "S101",   # assert (allowed in tests)
    # ── Legacy code warnings — accepted for now, file-level cleanup in
    # a dedicated tech-debt PR (cf docs/SESSION_LOG_2026-05-05.md). The
    # codebase has 100+ legacy try-except-pass patterns from collector
    # graceful-degradation paths. Promoting these from "ignored" to
    # "fixed" requires per-call-site review of what to log.
    "S110",   # try-except-pass — graceful collector degradation
    "S112",   # try-except-continue — same, in loops
    "S311",   # random for non-crypto (SHA256 used where it matters)
    "S608",   # SQL injection on sa.text() with named params (false positive
              # — sa.text() is parameterized via :name binds, not f-strings)
    "B904",   # raise...from in except — legacy exception passthroughs
    "E741",   # ambiguous l — used as math symbol in legacy stats code
    # French docstrings + comments use Unicode glyphs (× for multiply, ’
    # apostrophes, … ellipsis). All intentional ; ASCII-only would
    # degrade prose quality. Eliot writes briefings in French.
    "RUF001", # ambiguous-unicode-character-string
    "RUF002", # ambiguous-unicode-character-docstring
    "RUF003", # ambiguous-unicode-character-comment
    # Legacy patterns scheduled for refactor but not blocking :
    "ASYNC109", # async timeouts handled at httpx-client level, not per-fn
    "DTZ007",  # legacy strptime ; aware-datetime sweep is separate PR
    "DTZ011",  # date.today() in dev/test harness paths
    "RUF012",  # mutable class default (1 site, intentional cache)
    "RUF100",  # unused noqa — flagged after auto-fix sometimes ; remove later
    "B008",    # FastAPI canonical pattern: `param: T = Depends(provider)`
    # Phase A.1 followup tracker — rules reactivated incrementally as
    # the legacy code is rewritten:
    "ASYNC230", # blocking open() in async fn ; legacy CLI runners use sync IO
    "RUF005",   # tuple/list concat ; codebase prefers + for tuple builders
    "RUF059",   # unused unpacked variable ; legacy pattern in collector returns
    "S314",     # xml stdlib used in places where input is trusted (Atom feeds
                # from arxiv/Wikipedia have known schema). Migration to
                # defusedxml is partial — completed in collectors/arxiv_qfin
                # but services/* still pending.
]

[tool.ruff.lint.per-file-ignores]
# Tests use `assert` (S101), can hardcode credential-shaped strings
# (S105/S106 are false-positive on test fixtures), can deliberately
# assert against blind Exception (B017 — sometimes the test asserts
# that *anything* raised, ergonomic for protocol-fuzzing tests).
# Glob covers both `tests/<file>.py` AND `tests/<dir>/<file>.py` from
# any package root.
"**/tests/*.py" = ["S101", "S105", "S106", "B017", "F841", "B007", "DTZ001", "PIE810"]
"**/tests/**/*.py" = ["S101", "S105", "S106", "B017", "F841", "B007", "DTZ001", "PIE810"]
"tests/*.py" = ["S101", "S105", "S106", "B017", "F841", "B007", "DTZ001", "PIE810"]
"tests/**/*.py" = ["S101", "S105", "S106", "B017", "F841", "B007", "DTZ001", "PIE810"]
"**/conftest.py" = ["S101"]
# Cross-package imports of audit_log/csp/rate_limit middleware happen
# AFTER all standard imports — circular-import avoidance, justified.
"**/main.py" = ["E402"]
# CLI runners do conditional imports based on get_args() resolution
# of typing.Literal — same pattern as ADR-031 SessionType derivation.
"**/run_session_card.py" = ["E402"]
"**/run_session_cards_batch.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
warn_unused_configs = true
disallow_any_generics = true
no_implicit_reexport = true
exclude = [
    "^\\.venv",
    "^node_modules",
    "^phase0-artifacts",
]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_decorators = false
disallow_untyped_calls = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
disable_error_code = ["type-arg", "no-untyped-def", "no-untyped-call"]

# Wrapper modules around untyped 3rd-party ML libs — relax the strict
# gate while still requiring our own contracts to be coherent (return
# types, signatures, shape hints).
[[tool.mypy.overrides]]
module = ["ichor_ml.*"]
disallow_untyped_calls = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
warn_return_any = false
disable_error_code = [
    "arg-type",
    "call-overload",
    "unused-ignore",
    "no-any-return",
    "type-arg",
    "operator",
]

# 3rd-party ML libs without py.typed markers — ignore missing stubs
# globally so any consumer can call them without per-module noqa.
[[tool.mypy.overrides]]
module = [
    "river.*",
    "transformers.*",
    "numpyro.*",
    "lightgbm.*",
    "xgboost.*",
    "hmmlearn.*",
    "dtaidistance.*",
    "arch.*",
    "pyextremes.*",
    "interpret.*",
    "dowhy.*",
    "mlflow.*",
    "evidently.*",
    "mapie.*",
    "vollib.*",
    "sklearn.*",
    "scipy.*",
    "pandas",
    "pandas.*",
    "matplotlib.*",
    "openpyxl.*",
    "xlrd.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "8.0"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--showlocals",
]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:passlib.*",
]

[tool.coverage.run]
branch = true
source = ["apps", "packages"]
omit = ["*/tests/*", "*/__init__.py"]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 49
