# ============================================================================
# Ichor — root Python tooling configuration
# Applies to all Python packages in the monorepo (apps/api, apps/claude-runner,
# packages/agents, packages/ml).
# Each package has its own pyproject.toml for dependencies; this root file
# centralizes ruff/mypy/pytest config for consistency.
# ============================================================================

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    ".venv",
    ".venv-tooling",
    "node_modules",
    ".turbo",
    "phase0-artifacts",
    "infra/ansible/roles/*/files",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "S",    # flake8-bandit (security)
    "ASYNC", # flake8-async
    "DTZ",  # flake8-datetimez (no naive datetime)
    "PIE",  # flake8-pie
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line-too-long (handled by formatter)
    "S101",  # assert (allowed in tests)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106"]
"**/conftest.py" = ["S101"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
warn_unused_configs = true
disallow_any_generics = true
no_implicit_reexport = true
exclude = [
    "^\\.venv",
    "^node_modules",
    "^phase0-artifacts",
]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_decorators = false

[tool.pytest.ini_options]
minversion = "8.0"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--showlocals",
]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:passlib.*",
]

[tool.coverage.run]
branch = true
source = ["apps", "packages"]
omit = ["*/tests/*", "*/__init__.py"]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 70
