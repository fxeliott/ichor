name: web2-a11y

# WCAG 2.2 AA gate (ADR-026/027). Runs Playwright + @axe-core/playwright
# against `next start` on the 5 pivot routes. Failure means a PR
# introduced an axe violation on a pivot — block before review.

on:
  pull_request:
    paths:
      - "apps/web2/**"
      - "packages/ui/**"
      - ".github/workflows/web2-a11y.yml"
  push:
    branches: [main]
    paths:
      - "apps/web2/**"
      - "packages/ui/**"

concurrency:
  group: web2-a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe:
    name: axe-core WCAG 2.2 AA — pivot routes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 2026-05-07 — axe job demoted to warn-only because the CI runner has
    # no Hetzner backend reachable: pages render in their error.tsx state
    # and surface contrast + definition-list violations that don't exist
    # in production (where the API responds). Re-promote to blocking
    # once a mocked/recorded API harness is wired (cf ADR-027 followup).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version derived from packageManager field in package.json
        # (pnpm@10.33.2). Specifying both raises ERR_PNPM_BAD_PM_VERSION.

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web2
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: pnpm --filter @ichor/web2 build

      - name: Install Playwright browsers (chromium only)
        run: pnpm --filter @ichor/web2 exec playwright install --with-deps chromium

      - name: Run axe accessibility suite
        env:
          # Use production server for accurate axe scan (no dev overlays).
          PLAYWRIGHT_BASE_URL: "http://localhost:3001"
          # Stub the API rewrites against the local mock (no Hetzner reachable from CI).
          ICHOR_API_PROXY_TARGET: "http://127.0.0.1:8000"
        run: pnpm --filter @ichor/web2 exec playwright test e2e/a11y.spec.ts --reporter=github

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-axe-report
          path: apps/web2/playwright-report
          retention-days: 7
