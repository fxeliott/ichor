name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch when a new push lands
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  # -------------------------------------------------------------------------
  # JS/TS workspaces (apps/web, packages/ui)
  # -------------------------------------------------------------------------
  node:
    name: Node • lint + typecheck + build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # turbo needs prev commit for affected detection

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Phase 0: warn-only on lint (skeleton may not have full ESLint config yet).
      # Tighten to fail-on-error in Phase 1 once apps/web has a real ESLint setup.
      - name: Lint
        run: pnpm lint || echo "::warning::pnpm lint reported issues (warn-only Phase 0)"
        continue-on-error: true

      # Build BEFORE typecheck — Next.js generates next-env.d.ts and .next/types/
      # that the tsconfig.json includes. Without a build, tsc fails on missing types.
      # `next build` itself performs full type-checking, so this also covers app code.
      - name: Build (also runs Next type-checking)
        run: pnpm build

      - name: Typecheck (post-build, on packages without their own build)
        run: pnpm typecheck

  # -------------------------------------------------------------------------
  # Python workspaces (apps/api, apps/claude-runner, packages/agents,
  # packages/ml, packages/shared-types) — discovered dynamically
  # -------------------------------------------------------------------------
  python:
    name: Python • ruff + mypy + pytest
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - apps/api
          - apps/claude-runner
          - packages/agents
          - packages/ml
          - packages/shared-types
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.package }}/pyproject.toml

      - name: Create venv & install deps
        working-directory: ${{ matrix.package }}
        run: |
          uv venv
          uv pip install -e ".[dev]" || true  # tolerate empty optional deps in skeleton

      - name: Ruff check
        working-directory: ${{ matrix.package }}
        run: uv run ruff check . || true  # warn-only during Phase 0 skeleton

      - name: Mypy (lenient in Phase 0)
        working-directory: ${{ matrix.package }}
        run: uv run mypy --no-error-summary . || true

      - name: Pytest (skip cleanly if no tests)
        working-directory: ${{ matrix.package }}
        shell: bash
        run: |
          set +e
          has_tests=false
          [ -d tests ] && has_tests=true
          # Exclude .venv (which contains pytest's own internal test_*.py files)
          if [ "$has_tests" = false ] && find . -path ./.venv -prune -o -name "test_*.py" -print 2>/dev/null | grep -v "^./.venv" | grep -q .; then
            has_tests=true
          fi
          if [ "$has_tests" = true ]; then
            uv run pytest -ra
          else
            echo "::notice::No tests in ${{ matrix.package }} yet (Phase 0 skeleton)"
            exit 0
          fi

  # -------------------------------------------------------------------------
  # Ansible lint
  # -------------------------------------------------------------------------
  ansible:
    name: Ansible • lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install "ansible-lint>=25,<27"

      # Phase 0: warn-only (rules tightened in Phase 1 once playbooks stabilize).
      # `--profile=basic` skips style nits, focuses on real bugs.
      - name: Run ansible-lint
        working-directory: infra/ansible
        run: ansible-lint --offline --profile=basic || echo "::warning::ansible-lint reported issues (warn-only Phase 0)"
        continue-on-error: true
