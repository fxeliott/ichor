name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write

# CI ramp (cf SPEC.md §3.10 + SPEC_V2_HARDENING.md §6):
#   S1  → lint blocking  ✅ (Prettier + ESLint + Ruff)
#   S2  → + typecheck blocking ✅ (next build / tsc / mypy strict on shared-types+ml)
#   S3  → + tests blocking (smoke HTTP routers required; coverage 70/60/40/65 pending)
#   S4  → + audit (pip-audit, pnpm audit, trivy, schemathesis, playwright,
#                  alembic check, squawk, syft+grype) blocking — pending
#
# Each ramp step removes `|| true` / `continue-on-error: true` from one tier.
# Ratchet only forwards.

jobs:
  # -------------------------------------------------------------------------
  # JS/TS workspaces — lint blocking (S1)
  # -------------------------------------------------------------------------
  node-lint:
    name: Node • lint (Prettier + ESLint, blocking)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # S1: Prettier --check is blocking (fails on style drift).
      - name: Prettier check
        run: pnpm format:check

      # S1: ESLint is blocking. Phase 2 Semaine 0 uses a minimal flat config
      # at the repo root (eslint.config.mjs). It will be extended with
      # @next/eslint-plugin-next + typescript-eslint when apps/web2/ ships.
      - name: ESLint
        run: pnpm exec eslint . --max-warnings 0

  node-build:
    name: Node • build + typecheck (warn-only S1, blocking S2)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `next build` runs full type-checking; this also covers the
      # post-build typecheck step.
      - name: Build (S2 blocking)
        run: pnpm build

      - name: Typecheck (S2 blocking)
        run: pnpm typecheck

  # -------------------------------------------------------------------------
  # Frontend Vitest unit tests — blocking (S3)
  # -------------------------------------------------------------------------
  node-vitest:
    name: Node • Vitest unit tests (blocking)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest (apps/web2)
        run: pnpm --filter @ichor/web2 test

  # -------------------------------------------------------------------------
  # Frontend Playwright E2E — blocking (S4 ramp item)
  # -------------------------------------------------------------------------
  # Headless Chromium against `pnpm dev` auto-spawned by playwright.config.ts.
  # The browser binary is cached across runs to keep the job under 2 min.
  node-e2e:
    name: Node • Playwright E2E (blocking)
    needs: node-build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright caches its browser binaries under ~/.cache/ms-playwright.
      # Key includes the @playwright/test version to bust on upgrades.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web2/package.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium (with system deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: apps/web2
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit case)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: apps/web2
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright E2E
        working-directory: apps/web2
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web2/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web2/test-results/
          retention-days: 14

  # -------------------------------------------------------------------------
  # Python workspaces — lint blocking (S1)
  # -------------------------------------------------------------------------
  python-lint:
    name: Python • Ruff (check + format, blocking)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - apps/api
          - apps/claude-runner
          - packages/agents
          - packages/ml
          - packages/shared-types
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.package }}/pyproject.toml

      # Ruff is bundled with the dev deps; install just enough to invoke it.
      - name: Install package (dev) — best-effort
        working-directory: ${{ matrix.package }}
        run: |
          uv venv
          uv pip install -e ".[dev]" || uv pip install ruff

      - name: Ruff check (blocking)
        working-directory: ${{ matrix.package }}
        run: uv run ruff check .

      - name: Ruff format check (blocking)
        working-directory: ${{ matrix.package }}
        run: uv run ruff format --check .

  python-types-tests:
    name: Python • mypy + pytest (warn-only S1, ratchet S2/S3)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - apps/api
          - apps/claude-runner
          - packages/agents
          - packages/ml
          - packages/shared-types
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.package }}/pyproject.toml

      - name: Create venv & install deps
        working-directory: ${{ matrix.package }}
        run: |
          uv venv
          uv pip install -e ".[dev]" || true

      - name: Mypy (S2 blocking — strict for shared-types/ml only, lenient elsewhere)
        working-directory: ${{ matrix.package }}
        run: uv run mypy --no-error-summary .
        continue-on-error: ${{ matrix.package != 'packages/shared-types' && matrix.package != 'packages/ml' }}

      - name: Pytest (S3 ramp — blocking on apps/api + packages/ml + packages/agents)
        working-directory: ${{ matrix.package }}
        shell: bash
        # 2026-05-05 ramp : pytest now blocking on apps/api + packages/ml +
        # packages/agents (all verified green at HEAD). apps/claude-runner
        # and packages/shared-types remain warn-only until they land their
        # own integration tests (currently smoke-only / no tests yet).
        continue-on-error: ${{ matrix.package == 'apps/claude-runner' || matrix.package == 'packages/shared-types' }}
        run: |
          set +e
          has_tests=false
          [ -d tests ] && has_tests=true
          if [ "$has_tests" = false ] && find . -path ./.venv -prune -o -name "test_*.py" -print 2>/dev/null | grep -v "^./.venv" | grep -q .; then
            has_tests=true
          fi
          if [ "$has_tests" = true ]; then
            uv run pytest -ra --cov=src --cov-report=xml --cov-report=term
          else
            echo "::notice::No tests in ${{ matrix.package }} yet"
            exit 0
          fi

      # S3 ramp — coverage gate, warn-only for now.
      # SPEC §3.10 targets : apps/api 65 % · packages/ml 70 % · packages/agents 60 %
      #                    · apps/claude-runner 40 % · packages/shared-types 70 %
      # When all packages clear their target consistently for 2 weeks, flip
      # `continue-on-error` to false to make the gate blocking (S4 lock).
      - name: Coverage gate (S3 ramp, warn-only)
        if: hashFiles(format('{0}/coverage.xml', matrix.package)) != ''
        working-directory: ${{ matrix.package }}
        shell: bash
        continue-on-error: true
        env:
          TARGET_API: 65
          TARGET_ML: 70
          TARGET_AGENTS: 60
          TARGET_RUNNER: 40
          TARGET_SHARED: 70
        run: |
          case "${{ matrix.package }}" in
            apps/api)               target=$TARGET_API ;;
            packages/ml)            target=$TARGET_ML ;;
            packages/agents)        target=$TARGET_AGENTS ;;
            apps/claude-runner)     target=$TARGET_RUNNER ;;
            packages/shared-types)  target=$TARGET_SHARED ;;
            *)                      target=0 ;;
          esac
          actual=$(python -c "
          import xml.etree.ElementTree as ET, sys
          try:
              root = ET.parse('coverage.xml').getroot()
              # Cobertura XML : line-rate is 0.0..1.0 on the <coverage> root.
              rate = float(root.attrib.get('line-rate', 0.0))
              print(f'{rate * 100:.1f}')
          except Exception as e:
              print('0.0')
          ")
          echo "📊 ${{ matrix.package }} coverage: ${actual}% (target ${target}%)"
          python -c "
          actual = float('$actual'); target = $target
          if actual + 1e-6 < target:
              print(f'::warning::Coverage ${actual:.1f}% < target ${target}% (S3 ramp — non-blocking)')
              exit(1)
          " || true

      - name: Upload coverage artifact
        if: hashFiles(format('{0}/coverage.xml', matrix.package)) != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ strategy.job-index }}
          path: ${{ matrix.package }}/coverage.xml
          retention-days: 14

  # -------------------------------------------------------------------------
  # Ansible — lint blocking (S1)
  # -------------------------------------------------------------------------
  ansible-lint:
    name: Ansible • lint (blocking)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install "ansible-lint>=25,<27"

      # Profile=basic skips style nits, focuses on real bugs.
      - name: Run ansible-lint (blocking)
        working-directory: infra/ansible
        run: ansible-lint --offline --profile=basic
