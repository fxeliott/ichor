name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch when a new push lands
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  # -------------------------------------------------------------------------
  # JS/TS workspaces (apps/web, packages/ui)
  # -------------------------------------------------------------------------
  node:
    name: Node • lint + typecheck + build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # turbo needs prev commit for affected detection

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  # -------------------------------------------------------------------------
  # Python workspaces (apps/api, apps/claude-runner, packages/agents,
  # packages/ml, packages/shared-types) — discovered dynamically
  # -------------------------------------------------------------------------
  python:
    name: Python • ruff + mypy + pytest
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - apps/api
          - apps/claude-runner
          - packages/agents
          - packages/ml
          - packages/shared-types
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.package }}/pyproject.toml

      - name: Create venv & install deps
        working-directory: ${{ matrix.package }}
        run: |
          uv venv
          uv pip install -e ".[dev]" || true  # tolerate empty optional deps in skeleton

      - name: Ruff check
        working-directory: ${{ matrix.package }}
        run: uv run ruff check . || true  # warn-only during Phase 0 skeleton

      - name: Mypy (lenient in Phase 0)
        working-directory: ${{ matrix.package }}
        run: uv run mypy --no-error-summary . || true

      - name: Pytest (skip if no tests)
        working-directory: ${{ matrix.package }}
        run: |
          if [ -d tests ] || find . -name "test_*.py" -print -quit | grep -q .; then
            uv run pytest -ra
          else
            echo "No tests yet — skipping (Phase 0)"
          fi

  # -------------------------------------------------------------------------
  # Ansible lint
  # -------------------------------------------------------------------------
  ansible:
    name: Ansible • lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install ansible-lint==25.1.2

      - name: Run ansible-lint
        working-directory: infra/ansible
        run: ansible-lint --offline -p
