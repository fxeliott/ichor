name: CodeQL

# CodeQL static analysis (SAST). Free for public repositories. Catches:
#   - Python: SQL injection, XSS, hard-coded credentials, weak crypto, etc.
#   - JavaScript/TypeScript: prototype pollution, XSS, unsafe deserialization,
#     etc.
#
# Wired 2026-05-07 alongside the repo visibility flip to public.
# Cf SECURITY.md §Acknowledged residual risks (#No SAST in CI).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run on Sunday 04h UTC (light load) to catch new CodeQL queries
    # that may flag existing patterns we missed at PR time.
    - cron: "0 4 * * 0"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
