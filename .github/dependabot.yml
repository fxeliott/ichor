version: 2

# W100 — Supply-chain hardening post-Axios npm attack (March 2026).
# Every update block carries a `cooldown` window so newly-published
# package versions sit unconsumed for 3-14 days. Empirically, > 95 %
# of malicious npm package versions are yanked from the registry
# within 24-48 h after upload. A 3-day cooldown on patches + 7 day on
# minors + 14 day on majors gives community detection window before
# auto-merge fires (cf .github/workflows/dependabot-auto-merge.yml).
# Cooldown is applied per update block (not inheritable).

updates:
  # ---- npm / pnpm (root) ----
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels: [dependencies, javascript]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      tooling:
        patterns:
          - "turbo"
          - "typescript"
          - "prettier"
          - "eslint"
          - "@types/node"

  # ---- npm / apps/web ----
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, javascript, web]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # ---- npm / packages/ui ----
  - package-ecosystem: npm
    directory: /packages/ui
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: [dependencies, javascript, ui]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # ---- pip / Python packages ----
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, python, api]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: pip
    directory: /apps/claude-runner
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, python, claude-runner]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: pip
    directory: /packages/agents
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, python, agents]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: pip
    directory: /packages/ml
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, python, ml]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # ---- GitHub Actions ----
  # Stricter cooldown : CI passing on an Action does NOT validate that
  # the action's runtime behaviour is safe (it just means our tests
  # still run). The github-actions ecosystem does NOT support the
  # semver-*-days sub-keys (Dependabot's schema 2026 only allows
  # `default-days` for github-actions because action versions are
  # often tags, not SemVer). Verified empirically : the W100 first
  # cut included semver-*-days and triggered a check-run failure on
  # commit 8605fa4 ("The property semver-major-days is not supported
  # for the package ecosystem 'github-actions'"). Keeping a single
  # 14-day flat window here.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: [dependencies, github-actions]
    cooldown:
      default-days: 14

  # ---- Docker images (Ansible roles) ----
  - package-ecosystem: docker
    directory: /infra/ansible/roles/observability/files
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker, observability]
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: /infra/ansible/roles/langfuse/files
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker, langfuse]
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: /infra/ansible/roles/n8n/files
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker, n8n]
    cooldown:
      default-days: 7
