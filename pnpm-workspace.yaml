# Only JS/TS workspaces are listed here.
# Python workspaces (apps/api, apps/claude-runner, packages/agents,
# packages/ml, packages/shared-types) use uv per-package and are not
# part of pnpm.
packages:
  - "apps/web"
  - "packages/ui"

# Pin known-good versions across the workspace
catalog:
  next: "15.5.15"
  react: "19.0.0"
  react-dom: "19.0.0"
  typescript: "5.9.3"
  tailwindcss: "4.2.4"
  lightweight-charts: "5.2.0"
  motion: "12.38.0"
  orval: "8.9.1"
  zustand: "5.0.12"
  "@tanstack/react-query": "5.100.8"
  vitest: "4.1.5"
  "@playwright/test": "1.59.1"
