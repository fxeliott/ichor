# Only JS/TS workspaces are listed here.
# Python workspaces (apps/api, apps/claude-runner, packages/agents,
# packages/ml, packages/shared-types) use uv per-package and are not
# part of pnpm.
#
# 2026-05-06 — `apps/web` was removed from this workspace as part of
# the D.3 sprint (ADR-018 frontend rebuild). All 6 routes that lived
# only in apps/web were ported to apps/web2 (sessions index,
# briefings/[id], hourly-volatility/[asset], assets/[code], confluence,
# confluence/history). The apps/web directory remains on disk as a
# read-only reference until Phase C completes the design-system port ;
# it no longer receives pnpm install / build / dependabot updates.
packages:
  - "apps/web2"
  - "packages/ui"

# Pin known-good versions across the workspace
catalog:
  next: "15.5.15"
  react: "19.0.0"
  react-dom: "19.0.0"
  typescript: "5.9.3"
  tailwindcss: "4.2.4"
  motion: "12.38.0"
  orval: "8.9.1"
  zustand: "5.0.13"
  "@tanstack/react-query": "5.100.8"
  vitest: "4.1.5"
  "@playwright/test": "1.59.1"
