[project]
name = "ichor-claude-runner"
version = "0.0.0"
description = "Ichor — local Win11 FastAPI :8765, subprocesses claude -p headless via Max 20x"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.118.0",
    "uvicorn[standard]>=0.34.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "structlog>=25.1.0",
    "anyio>=4.7.0",
    "httpx>=0.28.0",
    # python-jose 3.3.0-era versions are vulnerable to CVE-2024-33663
    # (algorithm-confusion) + CVE-2025-61152 (timing-attack). Lib was
    # dormant 2021-2024, resumed 3.5.0 in May 2025. Floor bumped to
    # 3.5.0 in r46-round-5 per dependency-auditor recommendation
    # (round-46-round-3 audit). Future migration to `pyjwt` or
    # `joserfc` recommended (FastAPI docs prefer pyjwt for new code)
    # but defer until python-jose actually breaks something.
    "python-jose[cryptography]>=3.5.0",  # CF Access JWT verify
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",
    "ruff>=0.8.0",
    "mypy>=1.14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ichor_claude_runner"]
