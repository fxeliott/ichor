# Ichor — SOPS configuration
# Encrypts secrets at rest using age (modern, simpler than PGP/GPG).
# Recipients = age public keys allowed to decrypt.
#
# To generate Eliot's age key (one-time, on Win11):
#   age-keygen -o $HOME/.config/sops/age/keys.txt
#   # then store the OUTPUT public key in this file's `creation_rules` below
#
# To encrypt a new secret file:
#   sops --encrypt --in-place infra/secrets/some-file.yml
#
# To decrypt for editing:
#   sops infra/secrets/some-file.yml
#
# To decrypt to plain (CI/runtime):
#   sops --decrypt infra/secrets/some-file.yml > /tmp/decoded.yml
#
# CI secret: store the age private key as `SOPS_AGE_KEY` GitHub Actions secret.

creation_rules:
  # All YAML/JSON/env files under infra/secrets/ are encrypted-only.
  - path_regex: infra/secrets/.+\.(ya?ml|json|env)$
    age: >-
      # PLACEHOLDER — replace with Eliot's age public key after running
      # `age-keygen -o $HOME/.config/sops/age/keys.txt` in Phase 0 step 7.
      age1placeholderpublickeyreplacememanually00000000000000000000000

  # Ansible group_vars that contain secrets must end with `.sops.yml`
  - path_regex: infra/ansible/group_vars/.+\.sops\.ya?ml$
    age: >-
      age1placeholderpublickeyreplacememanually00000000000000000000000
