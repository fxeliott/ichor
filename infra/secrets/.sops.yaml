# Ichor — SOPS configuration
# Encrypts secrets at rest using age (modern, simpler than PGP/GPG).
#
# Eliot's age public key (generated 2026-05-02):
#   age1rgrexge5x3qvf8hns4dhrfhu92zsl9nyem5t6ge4nqn424lxefcsl08xaj
# Private key location: %APPDATA%\sops\age\keys.txt
# Backup: USB E:\age-key-ichor-2026-05-02.txt (SHA256-verified)
#
# === Daily commands ===
#   Encrypt new file:  sops --encrypt --in-place infra/secrets/some.env
#   Edit encrypted:    sops infra/secrets/some.env
#   Decrypt to stdout: sops --decrypt infra/secrets/some.env
#
# === CI ===
# Store the entire content of keys.txt as `SOPS_AGE_KEY` GitHub Actions secret
# (the env-var name is what sops reads at decrypt time alongside SOPS_AGE_KEY_FILE).

# NOTE on regex: sops 3.12.x on Windows receives the path as passed to the CLI
# (often relative, like `local-passwords.env`), not absolute. So we match by
# extension/suffix only — repository structure (`.gitignore` blocking `.env*`
# at root + `infra/secrets/.gitignore` whitelist) ensures secrets only land in
# the right places.

creation_rules:
  # Ansible group_vars convention
  - path_regex: \.sops\.ya?ml$
    age: age1rgrexge5x3qvf8hns4dhrfhu92zsl9nyem5t6ge4nqn424lxefcsl08xaj

  # Any .env file
  - path_regex: \.env$
    age: age1rgrexge5x3qvf8hns4dhrfhu92zsl9nyem5t6ge4nqn424lxefcsl08xaj

  # Any .secret.json (e.g. service account credentials)
  - path_regex: \.secret\.json$
    age: age1rgrexge5x3qvf8hns4dhrfhu92zsl9nyem5t6ge4nqn424lxefcsl08xaj
