# Cloudflare Tunnel — claude-runner local Win11
#
# Local-managed config. Drop at %USERPROFILE%\.cloudflared\config.yml.
# Pair with the credentials.json sibling file (output of `cloudflared tunnel create`
# OR generated via API with TunnelID + AccountTag + TunnelSecret).
#
# Tunnel UUID is set per-machine — replace below.

tunnel: <TUNNEL-UUID>
credentials-file: C:\Users\eliot\.cloudflared\<TUNNEL-UUID>.json
no-autoupdate: false
protocol: quic

ingress:
  # Port 8766 — claude-runner user-mode uvicorn (cf scripts/windows/start-claude-runner-user.ps1).
  # Was 8765 (NSSM service mode, deprecated).
  - service: http://127.0.0.1:8766

loglevel: info
logfile: C:\Users\eliot\.cloudflared\cloudflared.log

# Run via:
#   cloudflared tunnel run <TUNNEL-UUID>
# (uses default config path %USERPROFILE%\.cloudflared\config.yml)
#
# IMPORTANT: <UUID>.cfargotunnel.com is NOT publicly reachable by default.
# It resolves to IPv6 ULA fd10::/8 (private mesh).
# To expose publicly, you need ONE of:
#   1. Custom domain DNS route:
#        cloudflared tunnel route dns <UUID> claude-runner.yourdomain.com
#      Requires a Cloudflare-managed zone.
#   2. Cloudflare Access + WARP Connector on the calling machine
#      (Hetzner installs cloudflared in WARP mode, joins the private mesh).
#      Requires Cloudflare Access enabled on the account (1-click in dashboard).
