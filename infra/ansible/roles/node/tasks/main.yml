---
# Role: node — Node.js {{ node_major_version }} LTS via NodeSource + pnpm via Corepack

- name: Add NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"
    force: false

- name: Add NodeSource apt repository (Node {{ node_major_version }})
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }} signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main"
    filename: nodesource
    state: present
    update_cache: true

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present

- name: Enable Corepack (built-in pnpm/yarn manager)
  ansible.builtin.command: corepack enable
  changed_when: false  # idempotent

- name: Activate latest pnpm via Corepack
  ansible.builtin.command: corepack prepare pnpm@latest --activate
  changed_when: false

- name: Verify pnpm
  ansible.builtin.command: pnpm --version
  changed_when: false
  register: pnpm_version_check

- name: Display Node + pnpm versions
  ansible.builtin.debug:
    msg:
      - "Node: {{ ansible_facts.packages.nodejs[0].version | default('unknown') }}"
      - "pnpm: {{ pnpm_version_check.stdout }}"
