---
# Role: python — Python 3.12 + uv (no system pip pollution)
# Note: Ubuntu 24.04 (noble) ships Python 3.12 as the default `python3` —
# no PPA needed. Older Ubuntu versions would need ppa:deadsnakes/ppa.

- name: Verify system Python is 3.12+ (Ubuntu 24.04 default)
  ansible.builtin.command: "python3 --version"
  register: python_version_check
  changed_when: false

- name: Fail if system Python is not 3.12+
  ansible.builtin.assert:
    that: "'Python 3.12' in python_version_check.stdout or 'Python 3.13' in python_version_check.stdout"
    fail_msg: "Need Python 3.12+ (got {{ python_version_check.stdout }}). On older Ubuntu, add ppa:deadsnakes/ppa."

- name: Install Python {{ python_version }} dev tools (interpreter already present)
  ansible.builtin.apt:
    name:
      - python3-dev
      - python3-venv
      - python3-pip
    state: present

- name: Install uv (astral-sh/uv) — official installer per-user under /root
  ansible.builtin.shell: |
    set -euo pipefail
    if ! command -v uv >/dev/null 2>&1; then
      curl -LsSf https://astral.sh/uv/install.sh | sh
    fi
  args:
    executable: /bin/bash
    creates: /root/.local/bin/uv
  environment:
    UV_INSTALL_DIR: /root/.local/bin

- name: Symlink uv into /usr/local/bin
  ansible.builtin.file:
    src: /root/.local/bin/uv
    dest: /usr/local/bin/uv
    state: link

- name: Verify uv version
  ansible.builtin.command: uv --version
  changed_when: false
  register: uv_version_check

- name: Display uv version
  ansible.builtin.debug:
    msg: "{{ uv_version_check.stdout }}"
