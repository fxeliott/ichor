# Ichor SearXNG — self-hosted metasearch for Couche-2 / data_pool web research
# (ADR-084, Prompt_Ichor §6 #1). Loopback-only (127.0.0.1:8081), never public:
# the API surface is reached only by apps/api services on the same host.
# Voie D : $0 marginal (CPX21 already paid), no metered LLM, no API spend.
#
# secret_key is injected at deploy time (scripts/hetzner/register-searxng.sh)
# from `openssl rand -hex 32` into settings.yml — never committed.
services:
  searxng:
    # Pinned (was :latest — the only floating image in the fleet ; S02 socle
    # residual audit 2026-06-19). A date+hash tag is immutable, unlike :latest
    # whose content mutates under the tag on every recreate. Verify a newer tag
    # at https://hub.docker.com/r/searxng/searxng/tags (or docker manifest
    # inspect) before rolling forward — cf. #266: a tag retired from the Hub
    # red-fails the deploy.
    image: searxng/searxng:2026.6.17-4dfdc822c
    container_name: ichor-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/
      - UWSGI_WORKERS=2
      - UWSGI_THREADS=4
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

# Explicit subnet OUTSIDE the daemon auto-pool (172.20.0.0/16, fully subnetted —
# "all predefined address pools have been fully subnetted"). 172.21.0.0/24 is
# free. Pinned fleet allocation (S02 socle audit): bridge=172.17, searxng=172.21,
# observability=172.22, langfuse=172.23. n8n is intentionally unpinned (recreate
# is unsafe on its pre-existing crash-loop — see the n8n role).
networks:
  default:
    ipam:
      config:
        - subnet: 172.21.0.0/24
