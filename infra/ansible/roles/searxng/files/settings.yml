# Ichor SearXNG settings — JSON API enabled for programmatic web research.
# Loopback-only; the limiter/bot-detection is off because the only client is
# apps/api on the same host (no public abuse surface). secret_key is replaced
# at deploy by register-searxng.sh (openssl rand -hex 32).
use_default_settings: true

general:
  instance_name: "Ichor Research"
  debug: false
  donation_url: false
  contact_url: false
  enable_metrics: false

server:
  secret_key: "REPLACE_AT_DEPLOY"
  limiter: false
  public_instance: false
  image_proxy: false
  method: "GET"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "all"
  # JSON is what apps/api/services/web_research.py consumes.
  formats:
    - html
    - json

ui:
  static_use_hash: true

# Conservative outgoing settings — be a polite citizen of the upstream engines.
outgoing:
  request_timeout: 6.0
  max_request_timeout: 10.0
  pool_connections: 100
  pool_maxsize: 20
