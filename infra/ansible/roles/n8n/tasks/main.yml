---
# Role: n8n — workflow automation via docker-compose
# Reverse-proxy via Cloudflare Tunnel only.

- name: Ensure n8n dir exists
  ansible.builtin.file:
    path: /opt/ichor/n8n
    state: directory
    mode: "0755"

- name: Deploy n8n docker-compose
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/ichor/n8n/docker-compose.yml
    mode: "0644"

- name: Ensure n8n volumes + secrets dir
  ansible.builtin.file:
    path: "/opt/ichor/n8n/{{ item.path }}"
    state: directory
    mode: "0755"
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
  loop:
    - { path: n8n-data, owner: "1000", group: "1000" } # n8n container UID = node user
    - { path: postgres-data, owner: "999", group: "999" } # postgres alpine UID
    - { path: secrets, owner: "root", group: "root" }

- name: Write Docker secret (n8n Postgres password)
  ansible.builtin.copy:
    dest: /opt/ichor/n8n/secrets/n8n_postgres_password.txt
    content: "{{ N8N_POSTGRES_PASSWORD }}"
    # 0644 so the n8n + postgres container users can read
    mode: "0644"
    owner: root
    group: root
  no_log: true

- name: Start n8n stack
  community.docker.docker_compose_v2:
    project_src: /opt/ichor/n8n
    state: present
    pull: missing
