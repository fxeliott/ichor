name: ichor-n8n

services:
  n8n:
    # SECURITY (corrected S02 socle residual audit 2026-06-19): CVE-2026-33660
    # (Merge-Node AlaSQL RCE, CVSS 9.4) is fixed in 1.123.x, but this image is
    # pinned to 1.78.1 which is BELOW that fix — so the CVE is RE-EXPOSED at the
    # image level (the earlier "pinned past the CVE" claim was made false by the
    # round-7 revert below). It is MITIGATED operationally, NOT patched: n8n binds
    # loopback-only (127.0.0.1:5678 below) behind Cloudflare Access
    # (N8N_BASIC_AUTH_ACTIVE=false → auth handled upstream), so there is no public
    # surface and an RCE would require pre-existing host-internal access. The real
    # fix (upgrade to 1.123.x) is a dedicated round — see the revert note.
    # See deps audit docs/audits/dependencies-2026-05-03.md (CRITICAL-DEPS-1).
    # Reverted 1.123.27 → 1.78.1 (S02 round 7): the 1.78→1.123 jump fails to
    # START (breaking changes / migration), which red-failed the deploy at the
    # n8n role. 1.78.1 is the version that deployed cleanly before the bump.
    # NOTE: n8n has been crash-looping at runtime independently (pre-existing,
    # ~2 weeks) — a separate issue from this deploy-blocker. A proper 1.123
    # upgrade needs its own migration round.
    image: docker.n8n.io/n8nio/n8n:1.78.1
    container_name: ichor-n8n
    restart: unless-stopped
    depends_on: [n8n-postgres]
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD_FILE=/run/secrets/n8n_postgres_password
      - N8N_BASIC_AUTH_ACTIVE=false # auth handled by Cloudflare Access upstream
      - N8N_HOST=n8n.ichor.internal # hostname behind Cloudflare Tunnel
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - GENERIC_TIMEZONE=Europe/Paris
      - TZ=Europe/Paris
    volumes:
      - ./n8n-data:/home/node/.n8n
    secrets:
      - n8n_postgres_password
    networks: [n8n]

  n8n-postgres:
    image: postgres:18-alpine
    container_name: ichor-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD_FILE: /run/secrets/n8n_postgres_password
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    secrets:
      - n8n_postgres_password
    networks: [n8n]

secrets:
  n8n_postgres_password:
    file: ./secrets/n8n_postgres_password.txt

networks:
  n8n:
    name: ichor-n8n
    driver: bridge
    # Explicit subnet OUTSIDE the daemon default-address-pool (172.20.0.0/16) —
    # same exhaustion class as the observability #265 incident. searxng=172.21,
    # observability=172.22, langfuse=172.23 are taken ; 172.24.0.0/24 is free.
    # (S02 socle residual audit 2026-06-19, mirror of the observability #265 fix.)
    ipam:
      config:
        - subnet: 172.24.0.0/24
