---
# Role: langfuse — LLM observability via docker-compose
# Reverse-proxy via Cloudflare Tunnel only (no public port).

- name: Ensure Langfuse dir exists
  ansible.builtin.file:
    path: /opt/ichor/langfuse
    state: directory
    mode: "0755"

- name: Deploy Langfuse docker-compose
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/ichor/langfuse/docker-compose.yml
    mode: "0644"

- name: Ensure Langfuse volumes + secrets dir
  ansible.builtin.file:
    path: "/opt/ichor/langfuse/{{ item.path }}"
    state: directory
    mode: "0755"
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
  loop:
    - { path: postgres-data, owner: "999", group: "999" } # postgres alpine UID
    - { path: clickhouse-data, owner: "101", group: "101" } # clickhouse-server UID
    - { path: minio-data, owner: "1000", group: "1000" } # minio UID
    - { path: secrets, owner: "root", group: "root" }

- name: Write Docker secrets (Postgres + MinIO + ClickHouse passwords)
  ansible.builtin.copy:
    dest: "/opt/ichor/langfuse/secrets/{{ item.file }}"
    content: "{{ item.value }}"
    # 0644 so non-root container users (postgres UID 999, minio UID 1000) can read
    mode: "0644"
    owner: root
    group: root
  loop:
    - { file: langfuse_postgres_password.txt, value: "{{ LANGFUSE_POSTGRES_PASSWORD }}" }
    - { file: langfuse_minio_password.txt, value: "{{ LANGFUSE_MINIO_PASSWORD }}" }
    - { file: langfuse_clickhouse_password.txt, value: "{{ LANGFUSE_NEXTAUTH_SECRET }}" }
  no_log: true

- name: Write Langfuse .env (secrets injected from facts)
  ansible.builtin.copy:
    dest: /opt/ichor/langfuse/.env
    owner: root
    group: root
    mode: "0600"
    content: |
      DATABASE_URL=postgresql://langfuse:{{ LANGFUSE_POSTGRES_PASSWORD }}@langfuse-postgres:5432/langfuse
      DIRECT_URL=postgresql://langfuse:{{ LANGFUSE_POSTGRES_PASSWORD }}@langfuse-postgres:5432/langfuse
      NEXTAUTH_URL=https://langfuse.ichor.internal
      NEXTAUTH_SECRET={{ LANGFUSE_NEXTAUTH_SECRET }}
      SALT={{ LANGFUSE_SALT }}
      ENCRYPTION_KEY={{ LANGFUSE_ENCRYPTION_KEY }}
      CLICKHOUSE_URL=http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL=clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER=default
      CLICKHOUSE_PASSWORD={{ LANGFUSE_NEXTAUTH_SECRET }}  # reuse a strong secret as CH password
      CLICKHOUSE_CLUSTER_ENABLED=false
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY={{ LANGFUSE_MINIO_PASSWORD }}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      REDIS_HOST=langfuse-redis
      REDIS_PORT=6379
      TELEMETRY_ENABLED=false
      LANGFUSE_DEFAULT_PROJECT_ID=ichor
      LANGFUSE_DEFAULT_PROJECT_ROLE=ADMIN
  no_log: true

- name: Start Langfuse stack
  community.docker.docker_compose_v2:
    project_src: /opt/ichor/langfuse
    state: present
    pull: missing
