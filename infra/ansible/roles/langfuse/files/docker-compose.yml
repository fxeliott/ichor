name: ichor-langfuse

# Langfuse v3 self-host minimum stack
# Source: https://langfuse.com/self-hosting/docker-compose
# Versions verified 2026-05-02

services:
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: ichor-langfuse-web
    restart: unless-stopped
    depends_on: [langfuse-postgres, langfuse-clickhouse, langfuse-redis, langfuse-minio]
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    networks: [langfuse]

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: ichor-langfuse-worker
    restart: unless-stopped
    depends_on: [langfuse-postgres, langfuse-clickhouse, langfuse-redis, langfuse-minio]
    env_file: .env
    networks: [langfuse]

  langfuse-postgres:
    image: postgres:16-alpine
    container_name: ichor-langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD_FILE: /run/secrets/langfuse_postgres_password
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    secrets:
      - langfuse_postgres_password
    networks: [langfuse]

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.12.5.65-alpine
    container_name: ichor-langfuse-clickhouse
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD_FILE: /run/secrets/langfuse_clickhouse_password
    volumes:
      - ./clickhouse-data:/var/lib/clickhouse
    secrets:
      - langfuse_clickhouse_password
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks: [langfuse]

  langfuse-redis:
    image: redis:7-alpine
    container_name: ichor-langfuse-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    networks: [langfuse]

  langfuse-minio:
    image: minio/minio:RELEASE.2025-10-15T17-29-55Z
    container_name: ichor-langfuse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/langfuse_minio_password
    volumes:
      - ./minio-data:/data
    secrets:
      - langfuse_minio_password
    networks: [langfuse]

secrets:
  langfuse_postgres_password:
    file: ./secrets/langfuse_postgres_password.txt
  langfuse_minio_password:
    file: ./secrets/langfuse_minio_password.txt
  langfuse_clickhouse_password:
    file: ./secrets/langfuse_clickhouse_password.txt

networks:
  langfuse:
    name: ichor-langfuse
    driver: bridge
