---
# Role: observability — Loki + Grafana + Prometheus via docker-compose

- name: Ensure observability dir exists
  ansible.builtin.file:
    path: /opt/ichor/observability
    state: directory
    mode: "0755"

- name: Deploy docker-compose stack
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/ichor/observability/docker-compose.yml
    mode: "0644"

- name: Ensure Loki/Grafana/Prometheus volumes + secrets dir
  ansible.builtin.file:
    path: "/opt/ichor/observability/{{ item.path }}"
    state: directory
    mode: "0755"
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
  loop:
    # Container UIDs (must match upstream image defaults)
    - { path: loki-data, owner: "10001", group: "10001" }
    - { path: grafana-data, owner: "472", group: "472" }
    - { path: prometheus-data, owner: "65534", group: "65534" }
    - { path: prometheus-config, owner: "root", group: "root" }
    - { path: secrets, owner: "root", group: "root" }
    - { path: grafana-provisioning, owner: "root", group: "root" }
    - { path: grafana-provisioning/datasources, owner: "root", group: "root" }
    - { path: grafana-provisioning/dashboards, owner: "root", group: "root" }
    - { path: grafana-provisioning/dashboards/json, owner: "root", group: "root" }

- name: Write Docker secret (Grafana admin password)
  ansible.builtin.copy:
    dest: /opt/ichor/observability/secrets/grafana_admin_password.txt
    content: "{{ GRAFANA_ADMIN_PASSWORD }}"
    # 0644 so the grafana container user (UID 472) can read it
    mode: "0644"
    owner: root
    group: root
  no_log: true

# The Ichor Postgres password is machine-generated and persisted to
# /etc/ichor/db-password by the ichor_api role (openssl rand, idempotent). That
# role runs AFTER observability in site.yml, so the value is not yet an Ansible
# fact here — read it straight from the file the cluster already uses. On an
# already-provisioned host (every real deploy) the file exists; on a first-ever
# bootstrap it does not yet (ichor_api runs later), so the read is best-effort
# and the secret write below is skipped (the Grafana → Postgres datasource then
# wires on the next provision pass — non-fatal for the monitoring stack).
# BUGFIX : this task previously templated `{{ ICHOR_DB_PASSWORD }}` (uppercase),
# a variable defined NOWHERE (not SOPS, not group_vars) → undefined → the play
# aborted here (any_errors_fatal) → the full auto-deploy has failed at this step
# since 2026-05. `ichor_db_password` (lowercase) is the real, existing value.
- name: Read the machine-generated Ichor DB password (provisioned by ichor_api)
  ansible.builtin.slurp:
    src: /etc/ichor/db-password
  register: _ichor_db_pw_b64
  failed_when: false # absent on a first-ever bootstrap — handled by the guards below
  no_log: true

- name: Set ichor_db_password fact for the Grafana datasource secret
  ansible.builtin.set_fact:
    ichor_db_password: "{{ _ichor_db_pw_b64.content | b64decode | trim }}"
  when: _ichor_db_pw_b64.content is defined
  no_log: true

# Always write the secret FILE (docker-compose declares it as a file-secret, so a
# missing file would break `docker compose up`). On prod the password is the real
# value; only on a first-ever bootstrap (before ichor_api has generated the file)
# is it empty — Grafana then starts but its Postgres datasource fails auth until
# the next provision pass picks up the generated password (non-fatal monitoring
# degradation, never a play abort).
- name: Write Docker secret (Postgres ichor password, used by Grafana datasource)
  ansible.builtin.copy:
    dest: /opt/ichor/observability/secrets/ichor_db_password.txt
    content: "{{ ichor_db_password | default('') }}"
    mode: "0644" # readable by grafana UID 472
    owner: root
    group: root
  no_log: true

- name: Deploy Grafana provisioning (datasources + dashboard providers)
  ansible.builtin.copy:
    src: "grafana-provisioning/{{ item }}"
    dest: "/opt/ichor/observability/grafana-provisioning/{{ item }}"
    mode: "0644"
  loop:
    - datasources/datasources.yaml
    - dashboards/dashboards.yaml
  register: grafana_provisioning

- name: Deploy Grafana dashboard JSON files
  ansible.builtin.copy:
    src: "grafana-provisioning/dashboards/json/{{ item }}"
    dest: "/opt/ichor/observability/grafana-provisioning/dashboards/json/{{ item }}"
    mode: "0644"
  loop:
    - ichor-overview.json
  register: grafana_dashboards

- name: Deploy Prometheus config
  ansible.builtin.copy:
    src: prometheus.yml
    dest: /opt/ichor/observability/prometheus-config/prometheus.yml
    mode: "0644"
  register: prom_config

- name: Prune unused Docker networks (free the address pool before stack start)
  community.docker.docker_prune:
    networks: true
  # Orphaned compose networks accumulate and exhaust Docker's predefined
  # address pool ("all predefined address pools have been fully subnetted"),
  # which blocks creating the ichor-obs network and aborts the deploy
  # (2026-06-18 incident). docker_prune networks=true removes ONLY networks not
  # attached to any container, so the live api / cloudflared tunnel / langfuse /
  # n8n stacks are untouched — it just reclaims the leaked subnets.
  failed_when: false

- name: Start observability stack
  community.docker.docker_compose_v2:
    project_src: /opt/ichor/observability
    state: present
    pull: missing
    recreate: >-
      {{ 'always'
         if prom_config.changed or grafana_provisioning.changed or grafana_dashboards.changed
         else 'auto' }}
