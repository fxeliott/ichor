---
# Role: observability — Loki + Grafana + Prometheus via docker-compose

- name: Ensure observability dir exists
  ansible.builtin.file:
    path: /opt/ichor/observability
    state: directory
    mode: "0755"

- name: Deploy docker-compose stack
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/ichor/observability/docker-compose.yml
    mode: "0644"

- name: Ensure Loki/Grafana/Prometheus volumes + secrets dir
  ansible.builtin.file:
    path: "/opt/ichor/observability/{{ item.path }}"
    state: directory
    mode: "0755"
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
  loop:
    # Container UIDs (must match upstream image defaults)
    - { path: loki-data,         owner: "10001", group: "10001" }
    - { path: grafana-data,      owner: "472",   group: "472" }
    - { path: prometheus-data,   owner: "65534", group: "65534" }
    - { path: prometheus-config, owner: "root",  group: "root" }
    - { path: secrets,           owner: "root",  group: "root" }

- name: Write Docker secret (Grafana admin password)
  ansible.builtin.copy:
    dest: /opt/ichor/observability/secrets/grafana_admin_password.txt
    content: "{{ GRAFANA_ADMIN_PASSWORD }}"
    # 0644 so the grafana container user (UID 472) can read it
    mode: "0644"
    owner: root
    group: root
  no_log: true

- name: Deploy Prometheus config
  ansible.builtin.copy:
    src: prometheus.yml
    dest: /opt/ichor/observability/prometheus-config/prometheus.yml
    mode: "0644"
  register: prom_config

- name: Start observability stack
  community.docker.docker_compose_v2:
    project_src: /opt/ichor/observability
    state: present
    pull: missing
    recreate: "{{ 'always' if prom_config.changed else 'auto' }}"
