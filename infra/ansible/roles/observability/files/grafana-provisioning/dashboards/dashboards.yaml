apiVersion: 1

# Tells Grafana to load every JSON in /var/lib/grafana/dashboards on start.
# Dashboards are stored as code under
# infra/ansible/roles/observability/files/grafana-provisioning/dashboards/json/.

providers:
  - name: ichor
    orgId: 1
    folder: Ichor
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
