global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: production
    project: ichor

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: ichor-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: postgres
    static_configs:
      - targets: ["host.docker.internal:9187"] # postgres_exporter when added
