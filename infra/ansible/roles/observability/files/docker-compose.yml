name: ichor-observability

services:
  loki:
    image: grafana/loki:3.7.2
    container_name: ichor-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki-data:/loki
    networks: [obs]

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: ichor-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus-config:/etc/prometheus:ro
      - ./prometheus-data:/prometheus
    networks: [obs]

  grafana:
    # SECURITY: pinned past CVE-2025-4123 (XSS), CVE-2025-3260
    # (dashboard auth bypass /apis/dashboard.grafana.app/*),
    # CVE-2025-6023 / CVE-2025-6197. See deps audit
    # docs/audits/dependencies-2026-05-03.md (HIGH-DEPS-Grafana).
    image: grafana/grafana:11.4.3
    container_name: ichor-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
      # Pulled in by datasources/datasources.yaml — see provisioning dir
      ICHOR_DB_PASSWORD_FILE: /run/secrets/ichor_db_password
    ports:
      - "127.0.0.1:3001:3000" # 3001 host → 3000 container; 3000 reserved for Langfuse
    volumes:
      - ./grafana-data:/var/lib/grafana
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-provisioning/dashboards/json:/var/lib/grafana/dashboards:ro
    secrets:
      - grafana_admin_password
      - ichor_db_password
    networks: [obs]
    depends_on: [loki, prometheus]

secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  ichor_db_password:
    file: ./secrets/ichor_db_password.txt

networks:
  obs:
    name: ichor-obs
    driver: bridge
    # Pin an explicit subnet OUTSIDE the daemon default-address-pool
    # (172.20.0.0/16) — that pool is fully claimed by the ichor-n8n stack's /16
    # network, so without this pin compose tries to allocate ichor-obs from the
    # exhausted pool and the whole stack fails to start ("all predefined address
    # pools have been fully subnetted", 2026-06-18 incident). 172.22.0.0/24 is
    # free. Pinned fleet allocation (S02 socle audit): bridge=172.17,
    # searxng=172.21, observability=172.22, langfuse=172.23, n8n=172.24.
    ipam:
      config:
        - subnet: 172.22.0.0/24
