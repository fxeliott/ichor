---
# Other roles depend on this one to gain access to decrypted credentials.
# We don't auto-include via dependencies — instead the site.yml playbook
# runs `secrets` once as the first credential-bearing role, then handlers
# of subsequent roles consume the facts already in the host's vars space.

dependencies: []

galaxy_info:
  author: Eliot Delahousse
  description: Decrypt SOPS-encrypted secrets into Ansible facts
  license: MIT
  min_ansible_version: "2.18"
  platforms:
    - name: Ubuntu
      versions: ["24.04"]
