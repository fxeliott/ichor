---
# Role: secrets — decrypt all SOPS-encrypted .env files into Ansible facts
# Used as a dependency by other roles that need credentials.
#
# Mechanism:
#   1. Copy the encrypted files to /dev/shm (tmpfs, no disk write) — already
#      synced by the playbook bootstrap script (rsync of infra/ansible/).
#      The files travel as part of the playbook tree.
#   2. Run `sops --decrypt` via shell. SOPS_AGE_KEY_FILE points to the
#      server's age key (provisioned in the bootstrap step).
#   3. Parse KEY=VALUE lines into facts. no_log:true everywhere — secrets
#      never leak to ansible-playbook's stdout / log files.
#
# After this role runs, downstream roles can consume:
#   {{ R2_ACCESS_KEY_ID }} / {{ GRAFANA_ADMIN_PASSWORD }} / etc.

- name: Verify sops + age installed
  ansible.builtin.command: "{{ item }}"
  changed_when: false
  loop:
    - sops --version
    - age --version

- name: Verify server age key exists
  ansible.builtin.stat:
    path: /etc/sops/age/key.txt
  register: age_key_stat

- name: Fail if server age key missing
  ansible.builtin.fail:
    msg: |
      /etc/sops/age/key.txt missing on this host. Bootstrap step missed.
      Generate via:  age-keygen -o /etc/sops/age/key.txt && chmod 600 ...
      Then add the public key to infra/secrets/.sops.yaml and `sops updatekeys`
      all encrypted files locally.
  when: not age_key_stat.stat.exists

- name: Decrypt cloudflare.env (R2 + Cloudflare credentials)
  ansible.builtin.command:
    cmd: sops --decrypt {{ playbook_dir }}/../secrets/cloudflare.env
  register: _cf_decrypted
  changed_when: false
  no_log: true
  environment:
    SOPS_AGE_KEY_FILE: /etc/sops/age/key.txt

- name: Load cloudflare.env values into facts
  ansible.builtin.set_fact:
    "{{ item.split('=', 1)[0] }}": "{{ item.split('=', 1)[1] }}"
  loop: "{{ _cf_decrypted.stdout_lines }}"
  when: "'=' in item and not item.startswith('#')"
  no_log: true

- name: Decrypt local-passwords.env (langfuse + n8n + grafana)
  ansible.builtin.command:
    cmd: sops --decrypt {{ playbook_dir }}/../secrets/local-passwords.env
  register: _lp_decrypted
  changed_when: false
  no_log: true
  environment:
    SOPS_AGE_KEY_FILE: /etc/sops/age/key.txt

- name: Load local-passwords.env values into facts
  ansible.builtin.set_fact:
    "{{ item.split('=', 1)[0] }}": "{{ item.split('=', 1)[1] }}"
  loop: "{{ _lp_decrypted.stdout_lines }}"
  when: "'=' in item and not item.startswith('#')"
  no_log: true

- name: Confirm all expected secrets loaded (presence check, not value)
  ansible.builtin.assert:
    that: vars[item] is defined and vars[item] | length > 0
    fail_msg: "Expected secret '{{ item }}' missing or empty after decrypt"
  loop:
    - R2_ACCESS_KEY_ID
    - R2_SECRET_ACCESS_KEY
    - R2_ENDPOINT
    - R2_BUCKET
    - LANGFUSE_POSTGRES_PASSWORD
    - LANGFUSE_MINIO_PASSWORD
    - N8N_POSTGRES_PASSWORD
    - GRAFANA_ADMIN_PASSWORD
    - LANGFUSE_NEXTAUTH_SECRET
    - LANGFUSE_SALT
    - LANGFUSE_ENCRYPTION_KEY
  no_log: true
