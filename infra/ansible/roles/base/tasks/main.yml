---
# Role: base — system fundamentals (timezone, locale, swap, base packages)

- name: Set timezone
  community.general.timezone:
    name: "{{ ichor_timezone }}"

- name: Ensure locale generated
  community.general.locale_gen:
    name: "{{ ichor_locale }}"
    state: present

- name: Set system locale
  ansible.builtin.copy:
    dest: /etc/default/locale
    content: |
      LANG={{ ichor_locale }}
      LC_ALL={{ ichor_locale }}
    mode: "0644"
    owner: root
    group: root

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade safe packages (no removals)
  ansible.builtin.apt:
    upgrade: safe
    autoremove: true
    autoclean: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - wget
      - gnupg
      - lsb-release
      - software-properties-common
      - ufw
      - fail2ban
      - unattended-upgrades
      - htop
      - btop
      - tmux
      - jq
      - tree
      - rsync
      - git
      - vim
      - build-essential
      - pkg-config
      - libssl-dev
      - libffi-dev
    state: present

- name: Ensure 4GB swap file exists (no-op if already present)
  block:
    - name: Check if swapfile exists
      ansible.builtin.stat:
        path: /swapfile
      register: swapfile_stat

    - name: Create 4GB swapfile
      ansible.builtin.command: "fallocate -l 4G /swapfile"
      args:
        creates: /swapfile
      when: not swapfile_stat.stat.exists

    - name: Set swapfile permissions
      ansible.builtin.file:
        path: /swapfile
        mode: "0600"
      when: not swapfile_stat.stat.exists

    - name: Format swapfile
      ansible.builtin.command: mkswap /swapfile
      when: not swapfile_stat.stat.exists

    - name: Enable swapfile in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

    - name: Activate swap
      ansible.builtin.command: swapon /swapfile
      register: swapon_result
      changed_when: "'already' not in swapon_result.stderr | default('')"
      failed_when: swapon_result.rc != 0 and 'already' not in swapon_result.stderr | default('')

- name: Tune kernel for high-throughput services
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-ichor.conf
    reload: true
  loop:
    - { name: vm.swappiness,                  value: "10" }
    - { name: vm.overcommit_memory,           value: "1" }     # required by Redis
    - { name: net.core.somaxconn,             value: "65535" }
    - { name: net.ipv4.tcp_max_syn_backlog,   value: "65535" }
    - { name: fs.file-max,                    value: "2097152" }

- name: Configure unattended-upgrades (security only, no auto-reboot)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}-security";
        "${distro_id}ESMApps:${distro_codename}-apps-security";
        "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::Package-Blacklist {};
      Unattended-Upgrade::DevRelease "auto";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-New-Unused-Dependencies "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "false";
      Unattended-Upgrade::Automatic-Reboot "false";
      Unattended-Upgrade::SyslogEnable "true";
