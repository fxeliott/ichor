---
# Ichor — main provisioning playbook
# Run: ansible-playbook -i inventory/hetzner.yml site.yml
#
# Order matters: base → security → docker → languages → datastores → walg → observability → apps
# Each role is idempotent and tagged for selective runs.

- name: Provision Ichor production servers
  hosts: ichor_prod
  become: true
  any_errors_fatal: true

  pre_tasks:
    - name: Verify target OS is Ubuntu 24.04
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version is version('24.04', '>=')
        fail_msg: "Ichor requires Ubuntu 24.04 LTS or newer (got {{ ansible_distribution }} {{ ansible_distribution_version }})"

    - name: Wait for cloud-init to finish (avoid apt locks)
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: false # cloud-init may already be done or absent

  roles:
    - { role: base, tags: [base] }
    - { role: security, tags: [security, ssh, ufw, fail2ban] }
    - { role: docker, tags: [docker] }
    - { role: python, tags: [python] }
    - { role: node, tags: [node, pnpm] }
    - { role: postgres, tags: [postgres, db] }
    - { role: redis, tags: [redis] }
    # secrets must run before any role that consumes credentials
    - { role: secrets, tags: [secrets, walg, observability, langfuse, n8n, cloudflared, always] }
    - { role: walg, tags: [walg, backup] }
    - { role: cloudflared, tags: [cloudflared, tunnel] }
    # ── Core product FIRST. The prediction API + its packages must deploy
    #    BEFORE the optional auxiliary stacks (observability/langfuse/n8n) so a
    #    flaky Grafana / Docker-network issue can NEVER block a core api deploy.
    #    `any_errors_fatal: true` aborts the whole play on the first role failure,
    #    so when observability previously ran first (2026-06-18 incident: its
    #    `ichor-obs` network failed to create on an exhausted Docker address pool)
    #    the play died BEFORE ichor_api ran and the api never picked up the
    #    merged fixes. Ordering the core before the auxiliary stacks makes the
    #    api deploy resilient to any optional-stack failure.
    - { role: ichor_api, tags: [api, ichor_api] }
    # ichor_packages MUST come after ichor_api: it uses the venv created
    # by ichor_api to pip install -e the 3 internal packages.
    - { role: ichor_packages, tags: [api, ichor_api, packages, ichor_packages] }
    # ── Auxiliary observability / automation stacks LAST (non-core). A failure
    #    here is now post-deploy: the api is already live.
    - { role: observability, tags: [observability, loki, grafana, prometheus] }
    - { role: langfuse, tags: [langfuse] }
    - { role: n8n, tags: [n8n] }

  post_tasks:
    - name: Final health check — services must be running
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - ssh
        - ufw
        - fail2ban
        - postgresql
        - redis-server
        - docker
      tags: [healthcheck]
