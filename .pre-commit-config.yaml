# Ichor — pre-commit hooks
# Install:
#   pip install pre-commit
#   pre-commit install
#
# Hooks:
#   - gitleaks: secret scanning (BLOCKS commits if secret detected)
#   - prettier: autofix JS/TS/JSON/YAML/MD formatting
#   - ruff: autofix + lint Python (replaces black + flake8 + isort)
#   - standard hygiene: trailing-whitespace, end-of-file, merge-conflict, yaml syntax

repos:
  # ---- Secret scanning (CRITICAL) ----
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)

  # ---- General hygiene ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$  # Markdown sometimes uses trailing 2-space for line break
      - id: end-of-file-fixer
        exclude: phase0-artifacts/
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
        exclude: tsconfig.*\.json$  # tsconfigs allow JSON-with-comments
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: phase0-artifacts/
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ---- Python (ruff = linter + formatter) ----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ---- JS/TS/JSON/YAML/MD (prettier) ----
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, ts, tsx, jsx, json, markdown, yaml, css, html]
        exclude: |
          (?x)(
            ^pnpm-lock\.yaml$|
            ^phase0-artifacts/|
            ^\.next/|
            ^node_modules/
          )

  # ---- Conventional Commits (commit message) ----
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, chore, docs, refactor, perf, test, build, ci, revert, style]
