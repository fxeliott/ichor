[project]
name = "ichor-agents"
version = "0.0.0"
description = "Ichor — Claude Agent SDK + Pydantic AI agent definitions (Orchestrator, Macro, Sentiment, Positioning, CB-NLP, News-NLP, Critic, Journalist)"
requires-python = ">=3.12,<3.13"
dependencies = [
    "claude-agent-sdk>=0.1.71,<0.2",
    "pydantic-ai>=1.88,<2",
    "pydantic>=2.10.0",
    "httpx>=0.28.0",
    "structlog>=25.1.0",
    # Voie D (ADR-009): no Anthropic SDK in production path. Kept commented
    # for reference — uncomment only if Eliot ever switches to Voie C.
    # "anthropic>=0.43.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",
    "ruff>=0.8.0",
    "mypy>=1.14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ichor_agents"]
