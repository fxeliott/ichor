[project]
name = "ichor-agents"
version = "0.0.0"
description = "Ichor — Pydantic AI agent definitions (Orchestrator, Macro, Sentiment, Positioning, CB-NLP, News-NLP, Critic, Journalist)"
requires-python = ">=3.12,<3.13"
dependencies = [
    # NOTE: `claude-agent-sdk` was previously listed but never imported —
    # Voie D (ADR-009) runs Claude via subprocess `claude -p` from
    # apps/claude-runner, not via the SDK. Dropping it removes a chunk
    # of transitive dep weight. See deps audit
    # docs/audits/dependencies-2026-05-03.md (bloat candidates).
    #
    # Voie D (ADR-009): use pydantic-ai-slim to AVOID transitively pulling
    # the `anthropic` SDK that ships with the umbrella `pydantic-ai`.
    # Cerebras + Groq are OpenAI-compatible, so the [openai] extra is
    # sufficient for our 24/7 LLM automation. See deps audit HIGH-DEPS-Voie-D.
    "pydantic-ai-slim[openai]>=1.88,<2",
    "pydantic>=2.10.0",
    "httpx>=0.28.0",
    "structlog>=25.1.0",
    # Voie D (ADR-009): no Anthropic SDK in production path. Kept commented
    # for reference — uncomment only if Eliot ever switches to Voie C.
    # "anthropic>=0.43.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",
    "ruff>=0.8.0",
    "mypy>=1.14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ichor_agents"]
