[project]
name = "ichor-ml"
version = "0.0.0"
description = "Ichor — local ML stack (no LLM 24/7) — Bias Aggregator, HMM, DTW, Concept Drift, Vol Surface, VPIN, HAR-RV, NLP CB"
requires-python = ">=3.12,<3.13"
dependencies = [
    # Core ML
    "lightgbm>=4.5.0",
    "xgboost>=2.1.0",
    "scikit-learn>=1.6.0",
    "pytorch-cpu>=2.5.0 ; sys_platform == 'linux'",
    # Numerical
    "numpy>=1.26.0,<2.0",
    "pandas>=2.2.0",
    "scipy>=1.14.0",
    # Time series / regimes
    "hmmlearn>=0.3.3",
    "dtaidistance>=2.4.0",
    "river>=0.24.2",
    "arch>=8.0.0",
    "statsmodels>=0.14.6",
    # Bayesian
    "numpyro>=0.20.0",
    # Conformal & interpretability
    "mapie>=1.3.0",
    # NOTE: shap + econml dropped 2026-05-05 — neither imported in code
    # and they create a constraint conflict (econml caps shap<0.49 ; we
    # had shap>=0.51 which is unsatisfiable). Re-add with a coordinated
    # constraint pin if/when an actual use site lands.
    "interpret>=0.7.8",
    # Vol surface
    "vollib>=1.0.7",
    # Tail/extreme
    "pyextremes>=2.5.0",
    # Causal
    "dowhy>=0.12",
    # MLOps
    "mlflow>=3.11.1",
    "evidently>=0.7.21",
    # NLP CB self-host
    "transformers>=4.46.0",
    "torch>=2.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "ruff>=0.8.0",
    "mypy>=1.14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ichor_ml"]
