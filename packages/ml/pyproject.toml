[project]
name = "ichor-ml"
version = "0.0.0"
description = "Ichor — local ML stack (no LLM 24/7) — Bias Aggregator, HMM, DTW, Concept Drift, Vol Surface, VPIN, HAR-RV, NLP CB"
requires-python = ">=3.12,<3.13"
dependencies = [
    # Core ML
    "lightgbm>=4.5.0",
    "xgboost>=2.1.0",
    "scikit-learn>=1.6.0",
    # Numerical
    # numpy>=2 required by river>=0.24.2 (concept drift detector). All
    # other deps (lightgbm/xgboost/scipy/scikit-learn) support numpy 2.x
    # since their respective 4.x/2.x/1.13/1.5 releases.
    "numpy>=2.0",
    "pandas>=2.2.0",
    "scipy>=1.14.0",
    # Time series / regimes
    "hmmlearn>=0.3.3",
    "dtaidistance>=2.4.0",
    "river>=0.24.2",
    "arch>=8.0.0",
    "statsmodels>=0.14.6",
    # Bayesian
    "numpyro>=0.20.0",
    # NOTE: shap + econml dropped 2026-05-05 — neither imported in code
    # and they create a constraint conflict (econml caps shap<0.49 ; we
    # had shap>=0.51 which is unsatisfiable). Re-add with a coordinated
    # constraint pin if/when an actual use site lands.
    # NOTE: vollib was originally added for B-S implied-vol back-out from
    # option premiums, but our SABR-Hagan + SVI fits in vol/sabr_svi.py
    # are pure-numpy/scipy and don't need it. Dropping it removes a
    # numpy<2.0 cap that conflicted with river>=0.24.2 (numpy>=2.3.4).
    # Re-add when an actual call site needs it (and pin numpy<2 globally).
    # ─── 6 packages moved to [ml-research] extra in r46-round-5 ───
    # dependency-auditor r46-r3 audit : `dowhy` `interpret` `evidently`
    # `mlflow` `mapie` `pyextremes` had ZERO imports in apps/* +
    # packages/* + tests/* (grep verified r46-r5). Saved ~3GB venv
    # (mlflow + interpret + evidently + dowhy pull large transitive
    # graphs). Reintroduce on-demand via `pip install -e
    # 'packages/ml[ml-research]'` when an actual research call-site
    # lands. Pattern mirror : `apps/api[phase-d]` + `apps/api[phase-d-w117]`
    # opt-in extras (r29+r26).
    # NLP CB self-host
    "transformers>=4.46.0",
    "torch>=2.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",  # root pyproject's [pytest] sets asyncio_mode=auto
    "ruff>=0.8.0",
    "mypy>=1.14.0",
]

# r46-round-5 : opt-in extras for unused-in-prod ML research libs.
# Activated only when an actual research workflow needs them ; default
# install path (`uv sync` without `--all-extras` or with explicit
# `[ml-research]` filter) skips ~3GB transitive bloat.
ml-research = [
    "mapie>=1.3.0",  # Conformal & interpretability
    "interpret>=0.7.8",  # InterpretML EBM models
    "pyextremes>=2.5.0",  # Tail / extreme value theory
    "dowhy>=0.12",  # Causal inference
    "mlflow>=3.11.1",  # MLOps experiment tracking
    "evidently>=0.7.21",  # ML monitoring / drift dashboards
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ichor_ml"]

# PyTorch CPU index — torch on PyPI defaults to CUDA wheels on Linux
# (4 GB), but we run CPU-only on Hetzner. Route torch through the
# official CPU-only index (https://download.pytorch.org/whl/cpu).
# See https://docs.astral.sh/uv/guides/integration/pytorch/ for the
# pattern. Windows/macOS PyPI wheels are CPU-only by default ; we
# scope the source to Linux to keep dev machines unchanged.
[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

# ── mypy : local config because mypy doesn't walk up the tree to the
# root pyproject.toml. We mirror the relevant overrides here.
[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
warn_unused_configs = true
disallow_any_generics = true
no_implicit_reexport = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_decorators = false
disallow_untyped_calls = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
disable_error_code = [
    "type-arg",
    "no-untyped-def",
    "no-untyped-call",
    "valid-type",
    "unused-ignore",
    "no-any-return",
    "unreachable",
]

[[tool.mypy.overrides]]
module = ["ichor_ml.*"]
disallow_untyped_calls = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
warn_return_any = false
disable_error_code = [
    "arg-type",
    "call-overload",
    "unused-ignore",
    "no-any-return",
    "type-arg",
    "operator",
    "import-untyped",
]

[[tool.mypy.overrides]]
module = [
    "river.*", "transformers.*", "numpyro.*", "lightgbm.*", "xgboost.*",
    "hmmlearn.*", "dtaidistance.*", "arch.*", "pyextremes.*", "interpret.*",
    "dowhy.*", "mlflow.*", "evidently.*", "mapie.*", "vollib.*",
    "sklearn.*", "scipy.*", "pandas", "pandas.*", "matplotlib.*",
    "openpyxl.*", "xlrd.*", "torch.*",
]
ignore_missing_imports = true

[tool.uv.sources]
torch = [{ index = "pytorch-cpu", marker = "sys_platform == 'linux'" }]
