# Ichor ML model registry
# Versioned source of truth for ALL models running in production.
# Each entry must have a corresponding model card under model_cards/.
#
# Status taxonomy:
#   planned    — design-doc only, no code, no weights
#   scaffolded — code exists, lazy-loads or trains on demand, no validation yet
#   trained    — fitted on real Ichor data, has cross-val Brier on hold-out
#   live       — integrated into bias_aggregator with current weight > 0
#   deprecated — kept in registry for reproducibility, weight = 0

