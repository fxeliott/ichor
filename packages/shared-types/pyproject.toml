[project]
name = "ichor-shared-types"
version = "0.0.0"
description = "Ichor — Pydantic models shared across api / agents / ml / claude-runner"
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.10.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "ruff>=0.8.0",
    "mypy>=1.14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ichor_shared_types"]
