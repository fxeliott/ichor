[project]
name = "ichor-brain"
version = "0.0.0"
description = "Ichor — 4-pass Claude orchestration that produces session cards (régime → asset → stress → invalidation) and routes them through the Critic Agent gate."
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.10.0",
    "httpx>=0.28.0",
    "structlog>=25.1.0",
]

[project.optional-dependencies]
# `ichor-agents` is a soft runtime dep — the orchestrator's default
# critic_fn lazy-imports it. In environments that don't need the Critic
# gate (offline tests, prompt-prototyping), the dep is omitted.
critic = [
    "ichor-agents",
]
# Phase A.4.c (ADR-032) — Langfuse tracing. Optional so unit tests + CI
# can install ichor-brain without a hard dep on langfuse; the @observe
# shim in `ichor_brain.observability` falls back to a no-op decorator
# when the lib is absent.
observability = [
    "langfuse>=4.0.0",
]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",
    "ruff>=0.8.0",
    "mypy>=1.14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ichor_brain"]

# W99e — `ichor-agents` is a workspace package (packages/agents), not on
# PyPI. Without this hint, `uv run` does a fresh resolve at every step
# and fails because the [critic] extra points at an unresolvable name.
# Mirrors apps/api/pyproject.toml's [tool.uv.sources] block.
[tool.uv.sources]
ichor-agents = { path = "../agents", editable = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
addopts = "-ra --strict-markers"
